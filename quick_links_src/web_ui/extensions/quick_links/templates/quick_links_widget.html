<!-- Quick Links Sidebar Widget -->
<!-- Injected by chat_sidebar.html via sidebar_widgets context -->
<div class="sidebar-card" id="quick-links-panel" style="padding:10px 12px;">
  <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom: 0; padding:0;" onclick="qlToggle()" title="Click to collapse/expand">
    <span class="ql-icon"><i class="fas fa-bolt"></i></span>
    <span class="ql-title">QUICK LINKS</span>
    <span class="ql-chevron" id="ql-chevron" style="margin-left:auto;"><i class="fas fa-chevron-down"></i></span>
  </div>

  <div class="ql-body" id="ql-body" style="margin-top:10px;">
    <ul class="ql-list" id="ql-list">
      <!-- Populated by quick_links.js -->
    </ul>

    <button class="ql-add-btn" id="ql-add-btn" onclick="qlOpenForm()" title="Add a new quick link">
      <i class="fas fa-plus"></i> Add Link
    </button>

    <!-- Inline Add Form (hidden by default) -->
    <div class="ql-form" id="ql-form" style="display:none;">
      <div class="ql-form-row">
        <input class="ql-input" id="ql-input-icon"  type="text" placeholder="Icon..." maxlength="4" title="Icon (emoji or text)">
        <input class="ql-input ql-input-label" id="ql-input-label" type="text" placeholder="Label…" maxlength="40">
      </div>
      <input class="ql-input" id="ql-input-url" type="text" placeholder="URL or /internal/path">
      <div class="ql-form-row">
        <label class="ql-target-label">
          <input type="checkbox" id="ql-input-same-tab"> Same tab
        </label>
        <div class="ql-form-actions">
          <button class="ql-btn-cancel" onclick="qlCloseForm()">Cancel</button>
          <button class="ql-btn-save"   onclick="qlSaveNew()">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>

<link rel="stylesheet" href="/ext/quick_links/static/css/quick_links.css?v={{ version }}">
<script src="/ext/quick_links/static/js/quick_links.js?v={{ version }}&bust={{ range(1, 1000000) | random }}"></script>
