<style>
/* FullCalendar Sidebar Overrides */
#sidebar-fullcalendar {
    font-size: 11px;
}
#sidebar-fullcalendar .fc-header-toolbar {
    display: none !important; /* We use custom header arrows */
}
#sidebar-fullcalendar .fc-list-day-cushion {
    background: rgba(255, 255, 255, 0.05) !important;
    padding: 6px 10px !important;
    color: var(--accent);
    font-weight: 600;
}
#sidebar-fullcalendar .fc-list-event:hover td {
    background: rgba(255, 255, 255, 0.08) !important;
    cursor: pointer;
}
#sidebar-fullcalendar .fc-list-event-title a {
    color: var(--text) !important;
    text-decoration: none;
}
#sidebar-fullcalendar .fc-list-event-time {
    color: var(--muted) !important;
}
#sidebar-fullcalendar .fc-theme-standard td, 
#sidebar-fullcalendar .fc-theme-standard th {
    border-color: rgba(255, 255, 255, 0.1) !important;
}
#sidebar-fullcalendar .fc-list-empty {
    background: transparent !important;
    color: var(--muted);
    padding: 20px !important;
}
</style>

<div class="sidebar-card" id="calendar-widget" style="padding:10px 12px; display:flex; flex-direction:column;">
    <div class="sidebar-card-title" style="cursor:pointer; display:flex; align-items:center; gap:6px; margin-bottom:0; padding:0;" onclick="calendarWidget.toggleBody()">
        <span class="ql-icon"><i class="fas fa-calendar-alt"></i></span>
        <span class="ql-title">CALENDAR</span>
        
        <!-- Navigation Arrows -->
        <span style="margin-left:auto; display:flex; gap:12px; align-items:center; opacity:0.8;">
            <span onclick="event.stopPropagation(); calendarWidget.prev()" style="cursor:pointer; padding:2px; font-size:12px;" title="Previous Week"><i class="fas fa-chevron-left"></i></span>
            <span onclick="event.stopPropagation(); calendarWidget.next()" style="cursor:pointer; padding:2px; font-size:12px;" title="Next Week"><i class="fas fa-chevron-right"></i></span>
        </span>

        <span onclick="event.stopPropagation(); window.hecosOpenConfig('#calendar')" 
              style="margin-left:12px; cursor:pointer; font-size:12px; opacity:0.6; padding-right:4px;" 
              title="Configure Calendar"><i class="fas fa-cog"></i></span>
        <span class="ql-chevron" id="calendar-widget-toggle"><i class="fas fa-chevron-down"></i></span>
    </div>

    <div id="calendar-widget-body" class="ql-body" style="margin-top:10px;">
        <div id="sidebar-fullcalendar" style="border:1px solid rgba(255,255,255,0.05); border-radius:8px; overflow:hidden;"></div>
    </div>
</div>

<script src="/ext/calendar/static/js/fullcalendar.min.js"></script>
<script>
window.calendarWidget = (function() {
    const COLLAPSED_KEY = 'hecos-cal-collapsed';
    let _collapsed = localStorage.getItem(COLLAPSED_KEY) === '1';
    let calendar = null;

    function _applyCollapsed(yes) {
        const body = document.getElementById('calendar-widget-body');
        const tog  = document.getElementById('calendar-widget-toggle');
        if (body) body.style.display = yes ? 'none' : '';
        if (tog) tog.classList.toggle('collapsed', yes);
        
        // Force FullCalendar to recalculate its dimensions if it's un-collapsed
        if (!yes && calendar) {
            setTimeout(() => calendar.render(), 100);
        }
    }

    function toggleBody() {
        _collapsed = !_collapsed;
        localStorage.setItem(COLLAPSED_KEY, _collapsed ? '1' : '0');
        _applyCollapsed(_collapsed);
    }

    function initCalendar() {
        const el = document.getElementById('sidebar-fullcalendar');
        if (!el || !window.FullCalendar) {
            console.error("[CALENDAR WIDGET] FullCalendar library missing or element not found.");
            return;
        }

        calendar = new FullCalendar.Calendar(el, {
            // Create a custom view that shows exactly 14 days from the current day,
            // avoiding the "end of week" cutoff problem.
            views: {
                listRolling14: {
                    type: 'list',
                    duration: { days: 14 }
                }
            },
            initialView: 'listRolling14',
            headerToolbar: false, // Hidden because we use custom arrows in the widget title
            height: 'auto',
            firstDay: 1, // Start on Monday
            locale: 'en', // Using English as requested by user
            // Custom event source: the Hecos API wraps events in {ok, events:[...]},
            // so we must unwrap it manually — FullCalendar expects a plain array.
            events: function(fetchInfo, successCallback, failureCallback) {
                const url = `/api/ext/calendar/events?start=${fetchInfo.startStr}&end=${fetchInfo.endStr}`;
                fetch(url)
                    .then(r => r.json())
                    .then(data => {
                        if (data.ok && Array.isArray(data.events)) {
                            successCallback(data.events);
                        } else {
                            successCallback([]);
                        }
                    })
                    .catch(err => failureCallback(err));
            },
            noEventsContent: "No events this week",
            eventClick: function(info) {
                info.jsEvent.preventDefault(); // don't navigate to URL
                // Open the main Calendar Config module
                if (typeof window.hecosOpenConfig === 'function') {
                    window.hecosOpenConfig('#calendar');
                } else {
                    window.location.href = '/hecos/config/ui';
                }
            }
        });
        
        if (!_collapsed) {
            calendar.render();
        }
    }

    function prev() {
        if (calendar) calendar.prev();
    }

    function next() {
        if (calendar) calendar.next();
    }

    function refresh() {
        if (calendar) calendar.refetchEvents();
    }

    // Auto-refresh every 5 minutes
    setInterval(refresh, 300000);

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => { 
            _applyCollapsed(_collapsed); 
            initCalendar(); 
        });
    } else {
        _applyCollapsed(_collapsed);
        initCalendar();
    }

    return { refresh, toggleBody, prev, next };
})();
</script>
