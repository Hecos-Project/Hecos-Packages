<!-- config_weather_pro.html — Loaded lazily via /hecos/config/fragment/weather_pro -->
<div id="tab-weather_pro" class="panel">
    <div style="max-width:520px; margin:0 auto; padding:30px 20px;">

        <div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
            <div style="font-size:32px;">☀️</div>
            <div>
                <h2 style="margin:0; font-size:18px; font-weight:700;">Weather Pro</h2>
                <p style="margin:4px 0 0; font-size:12px; color:var(--muted);">
                    Real-time weather powered by <a href="https://open-meteo.com" target="_blank" style="color:var(--accent);">Open-Meteo</a> — no API key required.
                </p>
            </div>
        </div>

        <!-- Default City -->
        <div class="config-section" style="margin-bottom:20px;">
            <label class="config-label" for="wp-default-city">
                <i class="fas fa-map-marker-alt"></i> Default City
            </label>
            <div style="display:flex; gap:8px;">
                <input type="text" id="wp-default-city" class="config-input"
                       placeholder="e.g. Rome, London, New York…"
                       style="flex:1;">
                <button class="btn-secondary" onclick="wpSaveCity()" style="white-space:nowrap;">
                    <i class="fas fa-save"></i> Save
                </button>
            </div>
            <div class="config-hint">
                Leave empty to auto-detect from your IP address.
                For best results, set your city in your <a href="/hecos/config/ui#users" style="color:var(--accent)">User Profile</a>.
            </div>
        </div>

        <!-- Temperature unit -->
        <div class="config-section" style="margin-bottom:20px;">
            <label class="config-label">
                <i class="fas fa-thermometer-half"></i> Temperature Unit
            </label>
            <div style="display:flex; gap:10px; margin-top:6px;">
                <label class="config-radio-label" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="radio" name="wp-units" id="wp-units-celsius" value="celsius"> °C (Celsius)
                </label>
                <label class="config-radio-label" style="display:flex; align-items:center; gap:6px; cursor:pointer;">
                    <input type="radio" name="wp-units" id="wp-units-fahrenheit" value="fahrenheit"> °F (Fahrenheit)
                </label>
            </div>
        </div>

        <!-- Save all -->
        <button class="btn-primary" onclick="wpSaveAll()" style="width:100%; margin-top:4px;">
            <i class="fas fa-save"></i> Save Settings
        </button>

        <div id="wp-save-msg" style="margin-top:10px; font-size:12px; color:var(--accent); display:none; text-align:center;">
            ✓ Settings saved
        </div>

        <!-- Live preview -->
        <div style="margin-top:28px; border-top:1px solid var(--border); padding-top:20px;">
            <div style="font-size:11px; font-weight:700; letter-spacing:0.8px; text-transform:uppercase; color:var(--muted); margin-bottom:12px;">
                Live Preview
            </div>
            <div id="wp-preview-loading" style="font-size:12px; color:var(--muted); padding:16px; text-align:center;">
                <i class="fas fa-circle-notch fa-spin"></i> Loading preview…
            </div>
            <div id="wp-preview-data" style="display:none; padding:12px 16px; background:var(--bg2); border-radius:10px; font-size:13px;"></div>
        </div>
    </div>
</div>

<script>
(function() {
    const CONFIG_API = '/hecos/api/plugins/weather_pro/config';
    const DATA_API   = '/api/weather_pro/data';

    // ── Load saved config from autonomous endpoint ─────────────────────────
    async function loadWpConfig() {
        try {
            const r = await fetch(CONFIG_API, { credentials: 'same-origin' });
            const cfg = await r.json();
            const wp = cfg.weather_pro || {};
            document.getElementById('wp-default-city').value = wp.default_city || '';
            const units = wp.units || 'celsius';
            document.getElementById(
                units === 'fahrenheit' ? 'wp-units-fahrenheit' : 'wp-units-celsius'
            ).checked = true;
        } catch(e) { console.error('[WP Config] Load failed:', e); }
        loadPreview();
    }

    // ── Save helpers — POST to autonomous endpoint ─────────────────────────
    async function saveWpConfig(data) {
        try {
            const r = await fetch(CONFIG_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ weather_pro: data })
            });
            const result = await r.json();
            if (result.ok) {
                const msg = document.getElementById('wp-save-msg');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 2500);
            } else {
                console.error('[WP Config] Save error:', result.error);
            }
        } catch(e) { console.error('[WP Config] Save failed:', e); }
    }

    window.wpSaveCity = function() {
        saveWpConfig({ default_city: document.getElementById('wp-default-city').value.trim() });
    };

    window.wpSaveAll = function() {
        const units = document.querySelector('input[name="wp-units"]:checked')?.value || 'celsius';
        saveWpConfig({
            default_city: document.getElementById('wp-default-city').value.trim(),
            units
        });
    };

    // ── Live preview ───────────────────────────────────────────────────────
    async function loadPreview() {
        try {
            const r = await fetch(DATA_API, { credentials: 'same-origin' });
            const data = await r.json();
            document.getElementById('wp-preview-loading').style.display = 'none';
            const el = document.getElementById('wp-preview-data');
            if (data.error) {
                el.innerHTML = `<span style="color:#ff6b6b;">⚠️ ${data.error}</span>`;
            } else {
                const c = data.current || {};
                const u = data.current_units || {};
                el.innerHTML = `
                    <strong>${data.location}</strong><br>
                    🌡️ ${c.temperature_2m}${u.temperature_2m} &nbsp;
                    💧 ${c.relative_humidity_2m}% &nbsp;
                    💨 ${c.wind_speed_10m} ${u.wind_speed_10m}
                `;
            }
            el.style.display = 'block';
        } catch(e) {
            document.getElementById('wp-preview-loading').textContent = 'Preview unavailable.';
        }
    }

    // Init
    loadWpConfig();
})();
</script>
