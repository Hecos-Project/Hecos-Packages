id = "lists"
name = "Lists Manager"
version = "2.0.0"
author = "Antonio Meloni"
license = "GPL-3.0"
description = "Universal list manager plugin. Supports shopping lists, to-do lists, blacklists, and any other list type with items, priorities, and labels."
type = "plugin"
target_dir = "plugins"
plugin_dir = "."
hecos_min_version = "0.34.0"
readme = "README.md"
readme_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/lists_src/README.md"
icon_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/Hecos_module_Image_preview_square.png"
dependencies = []
optional_dependencies = []
pip_requirements = []
tag = "LISTS"
lazy_load = true
is_class_based = true
widgets = [
    { id = "lists_widget", extension_path = "lists_widget/" },
]

[commands]
create_list = "Crea una nuova lista vuota."
list_lists = "Mostra tutte le liste attive con il conteggio degli elementi."
show_list = "Mostra tutti gli elementi di una specifica lista."
add_to_list = "Aggiunge uno o più elementi a una lista. Crea la lista se non esiste."
check_item = "Segna un elemento come completato in una lista."
uncheck_item = "Ripristina un elemento come da fare."
remove_from_list = "Elimina definitivamente un elemento da una lista."
clear_done = "Rimuove tutti gli elementi già completati da una lista."
delete_list = "Elimina un'intera lista."
archive_list = "Archivia una lista (la nasconde dalla visuale principale)."

[[slash_commands]]
id = "lists"
aliases = [
    "/list",
    "/lists",
    "/liste",
]
description = "Mostra tutte le liste"
usage = "/list"
example = "/list"
icon = "📋"
method = "list_lists"
requires_args = false

[[slash_commands]]
id = "list_show"
aliases = [
    "/lista",
]
description = "Mostra una lista"
usage = "/lista <nome>"
example = "/lista Spesa"
icon = "🔍"
method = "show_list"
requires_args = true

[[slash_commands]]
id = "list_add"
aliases = [
    "/list add",
    "/lista aggiungi",
]
description = "Aggiunge elemento"
usage = "/list add <lista> <elemento>"
example = "/list add Spesa Uova"
icon = "➕"
method = "add_to_list"
requires_args = true

[[slash_commands]]
id = "list_done"
aliases = [
    "/list done",
    "/lista spunta",
]
description = "Spunta elemento"
usage = "/list done <lista> <elemento>"
example = "/list done Spesa Uova"
icon = "✅"
method = "check_item"
requires_args = true

[[tool_schema]]

[tool_schema.function]
name = "LISTS__create_list"
description = "Creates a new empty list. Use this when the user asks to 'create a list', 'crea la lista della spesa'."

[tool_schema.function.parameters]
type = "object"
required = [
    "name",
]

[tool_schema.function.parameters.properties.name]
type = "string"
description = "The name of the list (e.g. 'Spesa', 'Cose da fare')."

[tool_schema.function.parameters.properties.icon]
type = "string"
description = "Optional emoji icon for the list."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__list_lists"
description = "Lists all active lists."

[tool_schema.function.parameters]
type = "object"

[tool_schema.function.parameters.properties]

[[tool_schema]]

[tool_schema.function]
name = "LISTS__show_list"
description = "Shows the content of a specific list. Use when user asks 'what's in the shopping list?', 'cosa c'è nella spesa?'."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list to show."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__add_to_list"
description = "Adds one or more items to a list. Use this when user says 'add milk to shopping list', 'aggiungi pane e latte alla spesa'."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
    "items",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list."

[tool_schema.function.parameters.properties.items]
type = "string"
description = "The item(s) to add. Can be a single item or multiple items separated by comma."

[tool_schema.function.parameters.properties.priority]
type = "integer"
description = "Optional priority: 0 (normal), 1 (high), 2 (urgent). Default is 0."

[tool_schema.function.parameters.properties.label]
type = "string"
description = "Optional category/label for the item."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__check_item"
description = "Marks an item as done/completed. Use when user says 'I bought milk', 'ho preso il pane', 'spunta uova dalla spesa'."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
    "item_text",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list."

[tool_schema.function.parameters.properties.item_text]
type = "string"
description = "The text or partial text of the item to check."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__uncheck_item"
description = "Restores a completed item back to pending."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
    "item_text",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list."

[tool_schema.function.parameters.properties.item_text]
type = "string"
description = "The item to restore."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__remove_from_list"
description = "Deletes an item from a list completely."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
    "item_text",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list."

[tool_schema.function.parameters.properties.item_text]
type = "string"
description = "The item to remove."

[[tool_schema]]

[tool_schema.function]
name = "LISTS__clear_done"
description = "Clears all completed items from a list."

[tool_schema.function.parameters]
type = "object"
required = [
    "list_name",
]

[tool_schema.function.parameters.properties.list_name]
type = "string"
description = "The name of the list to clean up."

[config_panel]
tab_id = "lists"
tab_label = "Liste"
tab_icon = "fa-list-check"
category = "SISTEMA"
template_file = "templates/config/config_lists.html"
api_routes_file = "api.py"
config_api_get = "/hecos/api/plugins/lists/config"
config_api_post = "/hecos/api/plugins/lists/config"

[config_defaults]
export_folder = "%USERPROFILE%\\Desktop"

[capabilities]
llm_tools        = ["create_list", "list_lists", "show_list", "add_to_list", "check_item", "uncheck_item", "remove_from_list", "clear_done", "delete_list", "archive_list"]
slash_commands   = ["/list", "/lists", "/liste", "/lista", "/list add", "/list done"]
has_widget       = true
has_config_panel = true
has_api_routes   = true
has_system_calls = false
syscall_notes    = ""
notes            = "Universal list manager: shopping, to-do, blacklists, any type. Supports item priorities, labels, and archiving. Data stored in local SQLite DB. Export to desktop supported."
