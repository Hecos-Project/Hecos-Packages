<div class="sidebar-card vv-card" id="voice-visualizer-widget">

    <!-- Header -->
    <div class="vv-header">
        <span class="vv-title"><i class="fas fa-wave-square"></i> VOICE SYNC</span>
        <div class="vv-controls">
            <select id="vv-mode-select" title="Visualization Mode">
                <optgroup label="Abstract">
                    <option value="kitt">KITT Scanner</option>
                    <option value="audio_bars">Classic EQ Bars</option>
                    <option value="sine_wave">Oscilloscope Sine</option>
                    <option value="pulsing_orb">Pulsing Orb</option>
                </optgroup>
                <optgroup label="Pixel Mouth">
                    <option value="mouth_male">Mouth — Male</option>
                    <option value="mouth_female">Mouth — Femme</option>
                    <option value="mouth_robot">Mouth — Robot</option>
                    <option value="mouth_anime">Mouth — Anime</option>
                </optgroup>
            </select>
        </div>
    </div>

    <!-- ── KITT MODE ── -->
    <div class="vv-stage" id="vv-kitt" style="display:none;">
        <div class="kitt-chassis">
            <div class="kitt-grill" id="kitt-grill">
                <div class="kitt-bar" style="--i:0"></div>
                <div class="kitt-bar" style="--i:1"></div>
                <div class="kitt-bar" style="--i:2"></div>
                <div class="kitt-bar" style="--i:3"></div>
                <div class="kitt-bar" style="--i:4"></div>
                <div class="kitt-bar" style="--i:5"></div>
                <div class="kitt-bar" style="--i:6"></div>
                <div class="kitt-bar" style="--i:7"></div>
                <div class="kitt-bar" style="--i:8"></div>
                <div class="kitt-bar" style="--i:9"></div>
                <div class="kitt-bar" style="--i:10"></div>
                <div class="kitt-bar" style="--i:11"></div>
                <div class="kitt-bar" style="--i:12"></div>
                <div class="kitt-bar" style="--i:13"></div>
            </div>
            <div class="kitt-scanner-line" id="kitt-scanner"></div>
            <div class="kitt-label" id="kitt-label">H · E · C · O · S</div>
        </div>
    </div>

    <!-- ── CLASSIC EQ BARS ── -->
    <div class="vv-stage" id="vv-audio-bars" style="display:none;">
        <div class="eq-chassis">
            <div class="eq-bar" style="--i:0"></div>
            <div class="eq-bar" style="--i:1"></div>
            <div class="eq-bar" style="--i:2"></div>
            <div class="eq-bar" style="--i:3"></div>
            <div class="eq-bar" style="--i:4"></div>
            <div class="eq-bar" style="--i:5"></div>
            <div class="eq-bar" style="--i:6"></div>
            <div class="eq-bar" style="--i:7"></div>
        </div>
    </div>

    <!-- ── SINE WAVE ── -->
    <div class="vv-stage" id="vv-sine-wave" style="display:none;">
        <div class="sine-chassis">
            <canvas id="sine-canvas" width="260" height="90"></canvas>
            <div class="mouth-crt-overlay"></div>
        </div>
    </div>

    <!-- ── PULSING ORB ── -->
    <div class="vv-stage" id="vv-pulsing-orb" style="display:none;">
        <div class="orb-chassis">
            <div class="orb-core" id="orb-core"></div>
            <div class="orb-ring" id="orb-ring1"></div>
            <div class="orb-ring" id="orb-ring2"></div>
            <div class="orb-ring" id="orb-ring3"></div>
        </div>
    </div>

    <!-- ── MOUTH MODE ── -->
    <div class="vv-stage" id="vv-mouth" style="display:none;">
        <div class="mouth-frame">
            <canvas id="mouth-canvas" width="234" height="108"></canvas>
            <div class="mouth-crt-overlay"></div>
        </div>
    </div>

    <!-- Status -->
    <div class="vv-status" id="vv-status-bar">
        <span class="vv-dot" id="vv-dot"></span>
        <span id="vv-status-label">IDLE</span>
    </div>
</div>

<link rel="stylesheet" href="/ext/voice_visualizer/voice_visualizer.css?v={{ version }}&bust={{ range(1,999999)|random }}">
<script src="/ext/voice_visualizer/voice_visualizer.js?v={{ version }}&bust={{ range(1,999999)|random }}"></script>
