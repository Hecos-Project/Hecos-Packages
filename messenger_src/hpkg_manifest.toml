id = "messenger"
manifest_version = "1"
name = "Messenger"
version = "1.0.1"
author = "Antonio Meloni"
license = "GPL-3.0"
description = "Send and receive messages via Telegram, WhatsApp, and Discord.\n\n**Guida ai Comandi Rapidi:**\n- `/msg <piattaforma>:<destinatario> <testo>`: Invia un messaggio diretto scavalcando l'IA. Es: `/msg whatsapp:+393331234567 Ciao!`\n- `/send`: Alias esatto di `/msg`.\n"
type = "plugin"
pip_isolation = "isolated"
target_dir = "hpm"
plugin_dir = "."
hecos_min_version = "0.40.0"
icon_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/Hecos_module_Image_preview_square.png"
readme = "README.md"
readme_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/messenger_src/README.md"
dependencies = []
optional_dependencies = [
    "templates",
]
tag = "MESSENGER"
lazy_load = true
is_class_based = true
api_routes_file = "web/routes.py"

[commands]
send_message = "Sends a text message to a contact or channel on the specified platform."
list_accounts = "Lists all connected and configured messaging accounts and their status."
check_connection = "Checks the connectivity status of one or all configured messaging providers."
force_send = "Forces sending a message by explicitly pressing 'Enter' on the host machine."

[config_panel]
tab_id = "messenger"
tab_label = "Messenger"
tab_icon = "fa-paper-plane"
category = "CONNETTIVITÀ"
template_file = "web/templates/config_messenger.html"
api_routes_file = "web/routes.py"
config_api_get = "/hecos/api/plugins/messenger/config"
config_api_post = "/hecos/api/plugins/messenger/config"

[capabilities]
llm_tools = [
    "send_message",
    "list_accounts",
    "check_connection",
    "force_send",
]
slash_commands = [
    "/msg",
    "/send",
]
has_widget = false
has_config_panel = true
has_api_routes = true
has_system_calls = false
syscall_notes = ""
notes = ""

[[slash_commands]]
id = "msg"
manifest_version = "1"
aliases = [
    "/msg",
    "/send",
]
description = "Invia un messaggio tramite i provider configurati (Telegram, WhatsApp, Discord)."
usage = "/msg <piattaforma:destinatario> <testo_del_messaggio>"
example = "/msg whatsapp:+393331234567 Ciao, questo è un test!"
icon = "💬"
method = "msg_command"
requires_args = true

[[tool_schema]]
type = "function"
pip_isolation = "isolated"

[tool_schema.function]
name = "MESSENGER__send_message"
description = "Sends a text message to a contact or group on a specified messaging platform. Supported platforms: 'telegram', 'whatsapp', 'discord'. Use this when the user says 'manda un messaggio', 'send a message', 'scrivi a', 'write to', 'message on telegram/whatsapp/discord'. The 'to' field must include the platform prefix, e.g.: 'telegram:@username', 'telegram:123456789', 'discord:#channel-name', 'whatsapp:+393331234567'."

[tool_schema.function.parameters]
type = "object"
pip_isolation = "isolated"
required = [
    "to",
    "text",
]

[tool_schema.function.parameters.properties.to]
type = "string"
pip_isolation = "isolated"
description = "The recipient, including platform prefix. Examples: 'telegram:@myuser', 'telegram:123456789', 'whatsapp:+393331234567', 'discord:#general'. If the user does not specify a platform and only one is configured, default to that one."

[tool_schema.function.parameters.properties.text]
type = "string"
pip_isolation = "isolated"
description = "The message body to send. Can be a single line or multi-line text. Preserve formatting if the user specifies it."

[tool_schema.function.parameters.properties.platform]
type = "string"
pip_isolation = "isolated"
description = "Optional: explicit platform override ('telegram', 'whatsapp', 'discord'). Use this if the 'to' field does not contain a prefix."
enum = [
    "telegram",
    "whatsapp",
    "discord",
]

[tool_schema.function.parameters.properties.is_app_open]
type = "boolean"
pip_isolation = "isolated"
description = "Set to true if the user tells you WhatsApp or the target app is already open on their desktop. Significantly speeds up the sending procedure."

[[tool_schema]]
type = "function"
pip_isolation = "isolated"

[tool_schema.function]
name = "MESSENGER__list_accounts"
description = "Returns the list of all configured messaging accounts with their status (connected, disabled, error). Use this when the user asks 'which messaging accounts do I have?', 'quali account ho configurato?', 'show messenger status'."

[tool_schema.function.parameters]
type = "object"
pip_isolation = "isolated"

[tool_schema.function.parameters.properties]

[[tool_schema]]
type = "function"
pip_isolation = "isolated"

[tool_schema.function]
name = "MESSENGER__check_connection"
description = "Tests the connection to one or all configured messaging providers and returns the live status. Use this when the user says 'check messenger', 'testa la connessione', 'is telegram connected?'."

[tool_schema.function.parameters]
type = "object"
pip_isolation = "isolated"

[tool_schema.function.parameters.properties.platform]
type = "string"
pip_isolation = "isolated"
description = "Optional: which platform to test ('telegram', 'whatsapp', 'discord'). If omitted, all configured providers are tested."
enum = [
    "telegram",
    "whatsapp",
    "discord",
]

[[tool_schema]]
type = "function"
pip_isolation = "isolated"

[tool_schema.function]
name = "MESSENGER__force_send"
description = "Presses 'Enter' on the host machine to force sending a message if it got stuck in the text input box (especially useful for WhatsApp). Use this when the user says 'invialo', 'premi invio', 'send it again', or asks to manually trigger the send command."

[tool_schema.function.parameters]
type = "object"
pip_isolation = "isolated"

[tool_schema.function.parameters.properties]
