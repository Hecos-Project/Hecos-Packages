id = "webcam_feed"
name = "Webcam Feed"
version = "1.0.1"
hecos_min_version = "0.35.0"
type = "widget"
author = "Antonio Meloni"
description = "Displays a live webcam feed inside the Hecos Hub sidebar. Uses WebRTC for zero-latency streaming directly from the client device."
readme = "README.md"
license = "GPL-3.0"
keywords = [
    "webcam",
    "feed",
    "video",
    "widget",
    "camera",
]
widgets = [
    { id = "webcam_feed", extension_path = "web_ui/extensions/webcam_feed" },
]

[capabilities]
llm_tools = []
slash_commands = []
has_widget = true
has_config_panel = false
has_api_routes = false
has_system_calls = true
syscall_notes = "Uses browser WebRTC API (navigator.mediaDevices.getUserMedia) to access device camera. Permission prompt shown on first use."
notes = "Pure frontend widget. No backend processing. Streams from the device running the browser (PC, phone, tablet). Supports auto-start and camera device selection."
