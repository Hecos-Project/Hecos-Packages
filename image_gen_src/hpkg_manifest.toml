id = "image_gen"
manifest_version = "1"
name = "Image Generation"
version = "1.2.0"
author = "Antonio Meloni"
license = "GPL-3.0"
description = "AI Image Generation - Generates images from text prompts using multiple providers (Pollinations, Gemini, OpenAI DALL-E, Stability AI, HuggingFace). Fully autonomous package with its own TOML configuration. The easiest way to get started is to select Hugging Face as the provider and use one or more API keys, which you can obtain by logging in with an account."
icon = "🎨"
icon_url = "https://raw.githubusercontent.com/Hecos-Project/.github/main/profile/Urania_9800_Logo.png"
screenshots = []
category = "PLUGINS"
plugin_tag = "IMAGE_GEN"
is_class_based = true
type = "plugin"
pip_isolation = "shared"
plugin_dir = "."
lazy_load = true
readme = "README.md"
readme_url = "https://raw.githubusercontent.com/Hecos-Project/Hecos-Packages/main/image_gen_src/README.md"
dependencies = []
pip_requirements = [
    "requests==2.34.2",
    "httpx==0.28.1",
    "openai==2.41.0",
    "tomli_w",
    "huggingface_hub>=0.23.0",
    "Pillow>=10.0.0",
]
python_requires = ">=3.11"
signature = "nyokjzzh85DDbfN+Lp7fNCfJuPXwOVaXFKZAYEs09FvetbYgZHUo12I0REta0piI8WytLaAqAtdfG8u0gaoXDg=="

[routing]
instructions = "[IMAGE_GEN: generate_image:description] - Generate an image from a textual prompt. Only use this if the user explicitly asks to create, draw, or generate an image."

[[slash_commands]]
id = "img"
manifest_version = "1"
aliases = [
    "/img",
    "/image",
    "/photo",
    "/foto",
]
description = "Generates an AI image from a text description"
usage = "/img <descrizione>"
example = "/img foto fotorealistica di un gatto su Marte"
icon = "🖼️"
method = "generate_image"
requires_args = true

[[tool_schema]]
name = "IMAGE_GEN__generate_image"
description = "Generates an image from a text description. Uses the configured provider."

[tool_schema.parameters]
type = "object"
required = [
    "prompt",
]

[tool_schema.parameters.properties.prompt]
type = "string"
description = "Detailed description of the image or photo to generate. Translate to English if needed."

[tool_schema.parameters.properties.provider]
type = "string"
description = "Optional: override the configured provider for this call only. Values: 'huggingface', 'pollinations', 'gemini', 'openai', 'stability', 'airforce'."

[tool_schema.parameters.properties.model]
type = "string"
description = "Optional: override the model for this call only. For HuggingFace use full repo IDs like 'black-forest-labs/FLUX.1-schnell'."

[tool_schema.parameters.properties.hf_server]
type = "string"
description = "Optional: HuggingFace target server. Values: 'hf-inference', 'fal-ai', 'together', 'replicate', 'nebius', 'black-forest-labs'. Only used when provider is 'huggingface'."

[[tool_schema]]
name = "IMAGE_GEN__probe_providers"
description = "Tests all image generation providers and HuggingFace servers to see which ones are working. Returns a diagnostic report. Use when the user asks to check, test or diagnose providers, or when image generation keeps failing."

[tool_schema.parameters]
type = "object"
required = []

[tool_schema.parameters.properties.api_key]
type = "string"
description = "Optional HuggingFace API key to use for the probe. Leave empty to use the one from configuration."

[config_panel]
tab_id = "igen"
tab_label = "Image Gen"
category = "MULTIMEDIA"
tab_icon = "<i class=\"fas fa-image\"></i>"
template_file = "web/templates/config_panel.html"
js_file = "web/static/js/igen_panel.js"
css_file = "web/static/css/image_gen.css"
api_routes_file = "web/routes.py"
config_api_get = "/hecos/api/plugins/image_gen/config"
config_api_post = "/hecos/api/plugins/image_gen/config"

[capabilities]
llm_tools = [
    "IMAGE_GEN__generate_image",
    "IMAGE_GEN__probe_providers",
]
slash_commands = [
    "/img",
    "/image",
    "/photo",
    "/foto",
]
has_widget = false
has_config_panel = true
has_api_routes = true
has_system_calls = false
syscall_notes = ""
notes = "Supports multiple AI providers: Pollinations (free, default), Gemini, OpenAI DALL-E, Stability AI, HuggingFace (hf-inference, fal-ai, together, replicate, nebius, black-forest-labs). Requires network access. Provider and model are configurable."

